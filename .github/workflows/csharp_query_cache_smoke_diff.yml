name: C# Query Cache Smoke Diff

on:
  workflow_dispatch:
    inputs:
      baseline_run_id:
        description: 'Optional explicit baseline run ID; if blank, resolve the latest successful smoke run for baseline_ref'
        required: false
        default: ''
        type: string
      compare_run_id:
        description: 'Optional explicit compare run ID; if blank, resolve the latest successful smoke run for compare_ref'
        required: false
        default: ''
        type: string
      baseline_ref:
        description: 'Ref name used for automatic baseline run resolution'
        required: false
        default: 'main'
        type: string
      compare_ref:
        description: 'Ref name used for automatic compare run resolution; defaults to the workflow dispatch ref when blank'
        required: false
        default: ''
        type: string
      baseline_artifact_name:
        description: 'Optional artifact name containing the baseline cache smoke summary JSON; defaults to csharp-query-smoke-summary-json'
        required: false
        default: 'csharp-query-smoke-summary-json'
        type: string
      compare_artifact_name:
        description: 'Optional artifact name containing the compare cache smoke summary JSON; defaults to csharp-query-smoke-summary-json'
        required: false
        default: 'csharp-query-smoke-summary-json'
        type: string
      fail_on_status_regression:
        description: 'Fail if the overall result or any slice status regresses'
        required: true
        default: true
        type: boolean
      max_total_duration_delta_seconds:
        description: 'Fail if compare total duration exceeds baseline by more than this many seconds; leave blank to disable'
        required: false
        default: ''
        type: string
      max_slice_duration_delta_seconds:
        description: 'Fail if any compare slice duration exceeds baseline by more than this many seconds; leave blank to disable'
        required: false
        default: ''
        type: string

permissions:
  actions: read
  contents: read

jobs:
  csharp_query_cache_smoke_diff:
    name: C# Query Cache Smoke Diff
    runs-on: ubuntu-latest
    env:
      BASELINE_RUN_ID: ${{ inputs.baseline_run_id }}
      COMPARE_RUN_ID: ${{ inputs.compare_run_id }}
      BASELINE_REF_INPUT: ${{ inputs.baseline_ref }}
      COMPARE_REF_INPUT: ${{ inputs.compare_ref }}
      BASELINE_ARTIFACT_NAME_INPUT: ${{ inputs.baseline_artifact_name }}
      COMPARE_ARTIFACT_NAME_INPUT: ${{ inputs.compare_artifact_name }}
      DEFAULT_CACHE_SMOKE_SUMMARY_ARTIFACT_NAME: csharp-query-smoke-summary-json
      FAIL_ON_STATUS_REGRESSION: ${{ inputs.fail_on_status_regression }}
      MAX_TOTAL_DURATION_DELTA_SECONDS: ${{ inputs.max_total_duration_delta_seconds }}
      MAX_SLICE_DURATION_DELTA_SECONDS: ${{ inputs.max_slice_duration_delta_seconds }}
      WORKFLOW_DISPATCH_REF: ${{ github.ref_name }}
      BASELINE_DOWNLOAD_DIR: tmp/csharp_query_smoke_summary_diff/baseline
      COMPARE_DOWNLOAD_DIR: tmp/csharp_query_smoke_summary_diff/compare
      CACHE_SMOKE_DIFF_JSON_PATH: tmp/csharp_query_smoke_summary_diff/cache_smoke_sequence_diff.json
      CACHE_SMOKE_DIFF_ARTIFACT_NAME: csharp-query-smoke-diff-json

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify PowerShell and GitHub CLI
        shell: pwsh
        run: |
          pwsh -v
          gh --version

      - name: Resolve baseline and compare run IDs
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          function Get-RunMetadata {
            param(
              [Parameter(Mandatory = $true)]
              [string]$RunId,

              [Parameter(Mandatory = $true)]
              [string]$Source,

              [Parameter(Mandatory = $false)]
              [string]$RequestedRef
            )

            $run = gh api "/repos/$env:GITHUB_REPOSITORY/actions/runs/$RunId" | ConvertFrom-Json
            return [pscustomobject]@{
              RunId = [string]$run.id
              RefName = [string]$run.head_branch
              Sha = [string]$run.head_sha
              HtmlUrl = [string]$run.html_url
              Source = $Source
              RequestedRef = $RequestedRef
            }
          }

          function Resolve-LatestSmokeRun {
            param(
              [Parameter(Mandatory = $true)]
              [string]$RefName,

              [Parameter(Mandatory = $true)]
              [string]$ArtifactName
            )

            $encodedRef = [uri]::EscapeDataString($RefName)
            $runsResponse = gh api "/repos/$env:GITHUB_REPOSITORY/actions/workflows/test.yml/runs?branch=$encodedRef&status=success&per_page=50" | ConvertFrom-Json

            foreach ($run in @($runsResponse.workflow_runs)) {
              $artifactsResponse = gh api "/repos/$env:GITHUB_REPOSITORY/actions/runs/$($run.id)/artifacts?per_page=100" | ConvertFrom-Json
              $artifact = @($artifactsResponse.artifacts | Where-Object { $_.name -eq $ArtifactName -and -not $_.expired }) | Select-Object -First 1
              if ($artifact) {
                return [pscustomobject]@{
                  RunId = [string]$run.id
                  RefName = [string]$run.head_branch
                  Sha = [string]$run.head_sha
                  HtmlUrl = [string]$run.html_url
                  Source = 'latest-successful'
                  RequestedRef = $RefName
                }
              }
            }

            throw "Could not resolve a successful test.yml run for ref '$RefName' containing artifact '$ArtifactName'."
          }

          $baselineRef = if ([string]::IsNullOrWhiteSpace($env:BASELINE_REF_INPUT)) { 'main' } else { $env:BASELINE_REF_INPUT }
          $compareRef = if ([string]::IsNullOrWhiteSpace($env:COMPARE_REF_INPUT)) { $env:WORKFLOW_DISPATCH_REF } else { $env:COMPARE_REF_INPUT }
          $baselineArtifactName = if ([string]::IsNullOrWhiteSpace($env:BASELINE_ARTIFACT_NAME_INPUT)) { $env:DEFAULT_CACHE_SMOKE_SUMMARY_ARTIFACT_NAME } else { $env:BASELINE_ARTIFACT_NAME_INPUT }
          $compareArtifactName = if ([string]::IsNullOrWhiteSpace($env:COMPARE_ARTIFACT_NAME_INPUT)) { $env:DEFAULT_CACHE_SMOKE_SUMMARY_ARTIFACT_NAME } else { $env:COMPARE_ARTIFACT_NAME_INPUT }

          $baselineRun = if ([string]::IsNullOrWhiteSpace($env:BASELINE_RUN_ID)) {
            Resolve-LatestSmokeRun -RefName $baselineRef -ArtifactName $baselineArtifactName
          } else {
            Get-RunMetadata -RunId $env:BASELINE_RUN_ID -Source 'explicit' -RequestedRef $baselineRef
          }

          $compareRun = if ([string]::IsNullOrWhiteSpace($env:COMPARE_RUN_ID)) {
            Resolve-LatestSmokeRun -RefName $compareRef -ArtifactName $compareArtifactName
          } else {
            Get-RunMetadata -RunId $env:COMPARE_RUN_ID -Source 'explicit' -RequestedRef $compareRef
          }

          @(
            "BASELINE_RESOLVED_RUN_ID=$($baselineRun.RunId)"
            "BASELINE_RESOLVED_REF=$($baselineRun.RefName)"
            "BASELINE_RESOLVED_SHA=$($baselineRun.Sha)"
            "BASELINE_RESOLVED_URL=$($baselineRun.HtmlUrl)"
            "BASELINE_RESOLUTION_SOURCE=$($baselineRun.Source)"
            "BASELINE_REQUESTED_REF=$($baselineRun.RequestedRef)"
            "BASELINE_ARTIFACT_NAME=$baselineArtifactName"
            "COMPARE_RESOLVED_RUN_ID=$($compareRun.RunId)"
            "COMPARE_RESOLVED_REF=$($compareRun.RefName)"
            "COMPARE_RESOLVED_SHA=$($compareRun.Sha)"
            "COMPARE_RESOLVED_URL=$($compareRun.HtmlUrl)"
            "COMPARE_RESOLUTION_SOURCE=$($compareRun.Source)"
            "COMPARE_REQUESTED_REF=$($compareRun.RequestedRef)"
            "COMPARE_ARTIFACT_NAME=$compareArtifactName"
            "CACHE_SMOKE_DIFF_COMPARE_URL=$($env:GITHUB_SERVER_URL)/$($env:GITHUB_REPOSITORY)/compare/$($baselineRun.Sha)...$($compareRun.Sha)"
          ) | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download baseline cache smoke summary artifact
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force -Path $env:BASELINE_DOWNLOAD_DIR | Out-Null
          gh run download $env:BASELINE_RESOLVED_RUN_ID --repo $env:GITHUB_REPOSITORY --name $env:BASELINE_ARTIFACT_NAME --dir $env:BASELINE_DOWNLOAD_DIR

      - name: Download compare cache smoke summary artifact
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force -Path $env:COMPARE_DOWNLOAD_DIR | Out-Null
          gh run download $env:COMPARE_RESOLVED_RUN_ID --repo $env:GITHUB_REPOSITORY --name $env:COMPARE_ARTIFACT_NAME --dir $env:COMPARE_DOWNLOAD_DIR

      - name: Resolve downloaded cache smoke summary paths
        shell: pwsh
        run: |
          $baselineSummaryPath = Get-ChildItem -Path $env:BASELINE_DOWNLOAD_DIR -Recurse -File -Filter cache_smoke_sequence_summary.json | Select-Object -First 1 -ExpandProperty FullName
          if (-not $baselineSummaryPath) {
            throw "Could not find cache_smoke_sequence_summary.json under $($env:BASELINE_DOWNLOAD_DIR)."
          }

          $compareSummaryPath = Get-ChildItem -Path $env:COMPARE_DOWNLOAD_DIR -Recurse -File -Filter cache_smoke_sequence_summary.json | Select-Object -First 1 -ExpandProperty FullName
          if (-not $compareSummaryPath) {
            throw "Could not find cache_smoke_sequence_summary.json under $($env:COMPARE_DOWNLOAD_DIR)."
          }

          "BASELINE_SUMMARY_PATH=$baselineSummaryPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "COMPARE_SUMMARY_PATH=$compareSummaryPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run cache smoke summary diff
        shell: pwsh
        run: |
          $diffArgs = @(
            '-NoProfile'
            '-File'
            'scripts/testing/run_csharp_query_cache_smoke_summary_diff.ps1'
            '-BaselineSummaryPath'
            $env:BASELINE_SUMMARY_PATH
            '-CompareSummaryPath'
            $env:COMPARE_SUMMARY_PATH
            '-JsonOutputPath'
            $env:CACHE_SMOKE_DIFF_JSON_PATH
          )

          if ($env:FAIL_ON_STATUS_REGRESSION -eq 'true') {
            $diffArgs += '-FailOnStatusRegression'
          }

          if (-not [string]::IsNullOrWhiteSpace($env:MAX_TOTAL_DURATION_DELTA_SECONDS)) {
            $diffArgs += @('-MaxTotalDurationDeltaSeconds', $env:MAX_TOTAL_DURATION_DELTA_SECONDS)
          }

          if (-not [string]::IsNullOrWhiteSpace($env:MAX_SLICE_DURATION_DELTA_SECONDS)) {
            $diffArgs += @('-MaxSliceDurationDeltaSeconds', $env:MAX_SLICE_DURATION_DELTA_SECONDS)
          }

          & pwsh @diffArgs

      - name: Annotate cache smoke diff JSON with resolved run metadata
        if: always()
        shell: pwsh
        run: |
          if (-not (Test-Path $env:CACHE_SMOKE_DIFF_JSON_PATH)) {
            Write-Host "Cache smoke diff JSON was not produced; skipping run metadata annotation."
            exit 0
          }

          $diff = Get-Content $env:CACHE_SMOKE_DIFF_JSON_PATH -Raw | ConvertFrom-Json

          $diff | Add-Member -NotePropertyName baselineRun -NotePropertyValue ([pscustomobject]@{
            runId = $env:BASELINE_RESOLVED_RUN_ID
            resolutionSource = $env:BASELINE_RESOLUTION_SOURCE
            requestedRef = $env:BASELINE_REQUESTED_REF
            resolvedRef = $env:BASELINE_RESOLVED_REF
            resolvedSha = $env:BASELINE_RESOLVED_SHA
            runUrl = $env:BASELINE_RESOLVED_URL
            artifactName = $env:BASELINE_ARTIFACT_NAME
          }) -Force

          $diff | Add-Member -NotePropertyName compareRun -NotePropertyValue ([pscustomobject]@{
            runId = $env:COMPARE_RESOLVED_RUN_ID
            resolutionSource = $env:COMPARE_RESOLUTION_SOURCE
            requestedRef = $env:COMPARE_REQUESTED_REF
            resolvedRef = $env:COMPARE_RESOLVED_REF
            resolvedSha = $env:COMPARE_RESOLVED_SHA
            runUrl = $env:COMPARE_RESOLVED_URL
            artifactName = $env:COMPARE_ARTIFACT_NAME
          }) -Force

          $diff | Add-Member -NotePropertyName compareUrl -NotePropertyValue $env:CACHE_SMOKE_DIFF_COMPARE_URL -Force

          $diff | ConvertTo-Json -Depth 10 | Set-Content -Path $env:CACHE_SMOKE_DIFF_JSON_PATH

      - name: Upload cache smoke diff JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CACHE_SMOKE_DIFF_ARTIFACT_NAME }}
          path: ${{ env.CACHE_SMOKE_DIFF_JSON_PATH }}
          if-no-files-found: ignore
          retention-days: 7

      - name: Summarize cache smoke diff
        if: always()
        shell: pwsh
        run: |
          if (Test-Path $env:CACHE_SMOKE_DIFF_JSON_PATH) {
            function Test-IsStatusRegression {
              param(
                [Parameter(Mandatory = $true)]
                [string]$BaselineStatus,

                [Parameter(Mandatory = $true)]
                [string]$CompareStatus
              )

              if ($BaselineStatus -eq $CompareStatus) {
                return $false
              }

              if ($BaselineStatus -eq 'PASS' -and $CompareStatus -ne 'PASS') {
                return $true
              }

              if ($BaselineStatus -eq 'MISSING' -and $CompareStatus -ne 'MISSING') {
                return $false
              }

              if ($CompareStatus -eq 'MISSING') {
                return $true
              }

              return $false
            }

            function Format-SignedSecondsDelta {
              param(
                [Parameter(Mandatory = $false)]
                $Seconds
              )

              if ($null -eq $Seconds) {
                return $null
              }

              $numericSeconds = [double]$Seconds
              $sign = if ($numericSeconds -ge 0) { '+' } else { '' }
              return ("{0}{1:F1}s" -f $sign, $numericSeconds)
            }

            function Format-GeneratedAtUtc {
              param(
                [Parameter(Mandatory = $false)]
                $Value
              )

              if ($null -eq $Value) {
                return $null
              }

              if ($Value -is [DateTime]) {
                return $Value.ToUniversalTime().ToString('o')
              }

              if ($Value -is [DateTimeOffset]) {
                return $Value.ToUniversalTime().ToString('o')
              }

              $stringValue = [string]$Value
              if ([string]::IsNullOrWhiteSpace($stringValue)) {
                return $null
              }

              $parsedTimestamp = [DateTimeOffset]::MinValue
              if ([DateTimeOffset]::TryParse($stringValue, [ref]$parsedTimestamp)) {
                return $parsedTimestamp.ToUniversalTime().ToString('o')
              }

              return $stringValue
            }

            function Get-GeneratedAtDelta {
              param(
                [Parameter(Mandatory = $false)]
                [string]$BaselineGeneratedAtUtc,

                [Parameter(Mandatory = $false)]
                [string]$CompareGeneratedAtUtc
              )

              if ([string]::IsNullOrWhiteSpace($BaselineGeneratedAtUtc) -or [string]::IsNullOrWhiteSpace($CompareGeneratedAtUtc)) {
                return $null
              }

              $baselineTimestamp = [DateTimeOffset]::MinValue
              $compareTimestamp = [DateTimeOffset]::MinValue
              if (-not [DateTimeOffset]::TryParse($BaselineGeneratedAtUtc, [ref]$baselineTimestamp)) {
                return $null
              }

              if (-not [DateTimeOffset]::TryParse($CompareGeneratedAtUtc, [ref]$compareTimestamp)) {
                return $null
              }

              return Format-SignedSecondsDelta -Seconds (($compareTimestamp - $baselineTimestamp).TotalSeconds)
            }

            $diff = Get-Content $env:CACHE_SMOKE_DIFF_JSON_PATH -Raw | ConvertFrom-Json
            $thresholds = $diff.thresholds
            $sliceMap = @{}
            foreach ($sliceEntry in @($diff.slices)) {
              $sliceMap[[string]$sliceEntry.slice] = $sliceEntry
            }

            $orderedSliceNames = @('admission', 'reuse', 'lru')
            $remainingSliceNames = @($sliceMap.Keys | Where-Object { $_ -notin $orderedSliceNames } | Sort-Object)
            $sliceSummaryNames = @($orderedSliceNames + $remainingSliceNames | Select-Object -Unique)
            $regressionHighlights = @()
            $baselineGeneratedAtUtc = Format-GeneratedAtUtc -Value $diff.generatedAtUtc.baseline
            $compareGeneratedAtUtc = Format-GeneratedAtUtc -Value $diff.generatedAtUtc.compare
            $generatedAtDelta = Get-GeneratedAtDelta -BaselineGeneratedAtUtc $baselineGeneratedAtUtc -CompareGeneratedAtUtc $compareGeneratedAtUtc

            if (Test-IsStatusRegression -BaselineStatus ([string]$diff.overallResult.baseline) -CompareStatus ([string]$diff.overallResult.compare)) {
              $regressionHighlights += "Overall result regressed: `"$($diff.overallResult.baseline)`" -> `"$($diff.overallResult.compare)`"`"
            }

            foreach ($sliceName in $sliceSummaryNames) {
              if (-not $sliceMap.ContainsKey($sliceName)) {
                continue
              }

              $slice = $sliceMap[$sliceName]
              if (Test-IsStatusRegression -BaselineStatus ([string]$slice.status.baseline) -CompareStatus ([string]$slice.status.compare)) {
                $regressionHighlights += "Slice status regressed for `"$($slice.slice)`"`: `"$($slice.status.baseline)`" -> `"$($slice.status.compare)`"`"
              }

              if (($null -ne $slice.duration.deltaSeconds) -and ([double]$slice.duration.deltaSeconds -gt 0)) {
                $regressionHighlights += "Slice duration increased for `"$($slice.slice)`"`: `"$($slice.duration.delta)`"`"
              }
            }

            @(
              "## C# Query Cache Smoke Diff",
              "",
              "- Baseline run ID: `"$($env:BASELINE_RESOLVED_RUN_ID)`"",
              "- Baseline resolution: `"$($env:BASELINE_RESOLUTION_SOURCE)`"` (requested ref: `"$($env:BASELINE_REQUESTED_REF)`"`, resolved ref: `"$($env:BASELINE_RESOLVED_REF)`"`)",
              "- Baseline resolved SHA: `"$($env:BASELINE_RESOLVED_SHA)`"",
              "- Baseline run URL: `"$($env:BASELINE_RESOLVED_URL)`"",
              "- Baseline summary JSON path: `"$($env:BASELINE_SUMMARY_PATH)`"",
              "- Baseline summary generated at (UTC): $(if ([string]::IsNullOrWhiteSpace($baselineGeneratedAtUtc)) { 'n/a' } else { '`"' + $baselineGeneratedAtUtc + '`"' })",
              "- Baseline artifact: `"$($env:BASELINE_ARTIFACT_NAME)`"",
              "- Compare run ID: `"$($env:COMPARE_RESOLVED_RUN_ID)`"",
              "- Compare resolution: `"$($env:COMPARE_RESOLUTION_SOURCE)`"` (requested ref: `"$($env:COMPARE_REQUESTED_REF)`"`, resolved ref: `"$($env:COMPARE_RESOLVED_REF)`"`)",
              "- Compare resolved SHA: `"$($env:COMPARE_RESOLVED_SHA)`"",
              "- Compare run URL: `"$($env:COMPARE_RESOLVED_URL)`"",
              "- Compare summary JSON path: `"$($env:COMPARE_SUMMARY_PATH)`"",
              "- Compare summary generated at (UTC): $(if ([string]::IsNullOrWhiteSpace($compareGeneratedAtUtc)) { 'n/a' } else { '`"' + $compareGeneratedAtUtc + '`"' })",
              "- Compare URL: `"$($env:CACHE_SMOKE_DIFF_COMPARE_URL)`"",
              "- Compare artifact: `"$($env:COMPARE_ARTIFACT_NAME)`"",
              "- Diff JSON artifact: `"$($env:CACHE_SMOKE_DIFF_ARTIFACT_NAME)`"",
              "- Diff JSON path: `"$($env:CACHE_SMOKE_DIFF_JSON_PATH)`"",
              "- Baseline overall result: `"$($diff.overallResult.baseline)`"",
              "- Compare overall result: `"$($diff.overallResult.compare)`"",
              "- Overall result delta: `"$($diff.overallResult.delta)`"",
              "- Baseline total duration: `"$($diff.totalDuration.baseline)`"",
              "- Compare total duration: `"$($diff.totalDuration.compare)`"",
              "- Total duration delta: `"$($diff.totalDuration.delta)`"",
              "- Baseline project filter: `"$($diff.projectFilter.baseline)`"",
              "- Compare project filter: `"$($diff.projectFilter.compare)`"",
              "- Project-filter delta: `"$($diff.projectFilter.delta)`"",
              "- Baseline output dir: `"$($diff.outputDir.baseline)`"",
              "- Compare output dir: `"$($diff.outputDir.compare)`"",
              "- Output-dir delta: `"$($diff.outputDir.delta)`"",
              "- Baseline failure detail: $(if ($null -eq $diff.failureDetail.baseline -or [string]::IsNullOrWhiteSpace([string]$diff.failureDetail.baseline)) { 'n/a' } else { '`"' + [string]$diff.failureDetail.baseline + '`"' })",
              "- Compare failure detail: $(if ($null -eq $diff.failureDetail.compare -or [string]::IsNullOrWhiteSpace([string]$diff.failureDetail.compare)) { 'n/a' } else { '`"' + [string]$diff.failureDetail.compare + '`"' })",
              "- Failure-detail delta: `"$($diff.failureDetail.delta)`"",
              "- Fail on status regression: $(if ($thresholds.failOnStatusRegression) { 'true' } else { 'false' })",
              "- Max total duration delta seconds: $(if ($null -eq $thresholds.maxTotalDurationDeltaSeconds) { 'disabled' } else { $thresholds.maxTotalDurationDeltaSeconds })",
              "- Max slice duration delta seconds: $(if ($null -eq $thresholds.maxSliceDurationDeltaSeconds) { 'disabled' } else { $thresholds.maxSliceDurationDeltaSeconds })",
              "- Thresholds passed: $(if ($thresholds.passed) { 'true' } else { 'false' })"
            ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

            if (-not [string]::IsNullOrWhiteSpace($generatedAtDelta)) {
              "- Generated-at delta: `"$generatedAtDelta`"" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            }

            if ($regressionHighlights.Count -gt 0) {
              @(
                "",
                "### Regression Highlights",
                ""
              ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

              foreach ($highlight in $regressionHighlights) {
                "- $highlight" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
              }
            }

            if ($sliceSummaryNames.Count -gt 0) {
              @(
                "",
                "### Slice Deltas",
                ""
              ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

              foreach ($sliceName in $sliceSummaryNames) {
                if (-not $sliceMap.ContainsKey($sliceName)) {
                  continue
                }

                $slice = $sliceMap[$sliceName]
                @(
                  "- $($slice.slice): status delta = `"$($slice.status.delta)`"`, duration delta = `"$($slice.duration.delta)`"`"
                ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
              }
            }

            if ($thresholds.failures.Count -gt 0) {
              @(
                "",
                "### Threshold Failures",
                ""
              ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

              foreach ($failure in $thresholds.failures) {
                "- $failure" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
              }
            }
          } else {
            @(
              "## C# Query Cache Smoke Diff",
              "",
              "- Diff JSON was not produced at `"$($env:CACHE_SMOKE_DIFF_JSON_PATH)`""
            ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }
